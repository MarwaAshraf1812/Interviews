<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Mastery — Study Chain</title>
  <style>
    :root {
      --ink: #0b0f17;
      --panel: #10161f;
      --panel-2: #141c28;
      --border: #232e3d;
      --text: #e6ecf3;
      --muted: #7c8ba1;
      --ref: #00d8ff;
      /* React Cyan — "linked" / studied */
      --prim: #5ee6d0;
      /* in-progress */
      --warn: #ff7a7a;
      /* mistake / gotcha coral */
      --mono: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
      --sans: 'Inter', -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--ink);
      color: var(--text);
      font-family: var(--sans);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ---------- Sidebar ---------- */
    #sidebar {
      width: 100%;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      position: relative;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-sizing: border-box;
    }

    .brand {
      padding: 0 20px 20px 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .brand .tag {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ref);
      letter-spacing: 1px;
    }

    .brand h1 {
      font-size: 18px;
      margin: 6px 0 4px 0;
      font-weight: 700;
    }

    .brand .sub {
      font-size: 12px;
      color: var(--muted);
    }

    .progress-wrap {
      padding: 14px 20px 18px 20px;
      border-bottom: 1px solid var(--border);
    }

    .progress-bar {
      height: 6px;
      background: var(--panel-2);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--ref), var(--prim));
      border-radius: 4px;
      transition: width .4s ease;
    }

    .progress-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    .batch {
      border-bottom: 1px solid var(--border);
    }

    .batch-head {
      padding: 12px 20px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .5px;
      user-select: none;
    }

    .batch-head:hover {
      color: var(--text);
    }

    .batch-head .count {
      font-size: 10px;
      opacity: .7;
    }

    .topic-list {
      display: none;
      padding-bottom: 6px;
    }

    .topic-list.open {
      display: block;
    }

    .topic-item {
      padding: 8px 20px 8px 34px;
      font-size: 13px;
      cursor: pointer;
      color: var(--muted);
      border-left: 2px solid transparent;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topic-item:hover {
      background: var(--panel-2);
      color: var(--text);
    }

    .topic-item.active {
      background: var(--panel-2);
      color: var(--text);
      border-left-color: var(--ref);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.done {
      background: var(--ref);
      box-shadow: 0 0 6px var(--ref);
    }

    .dot.pending {
      background: transparent;
      border: 1.5px dashed var(--muted);
    }

    /* ---------- Main ---------- */
    #main {
      flex: 1;
      padding: 24px 16px;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }

    /* ---------- Mobile Header & Drawer Styles ---------- */
    .mobile-header {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 990;
      height: 56px;
      box-sizing: border-box;
    }

    .mobile-header .brand-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      font-family: var(--mono);
    }

    .menu-toggle {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 14px;
      font-family: var(--mono);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .menu-toggle:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--ref);
    }

    .sidebar-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(5, 9, 14, 0.7);
      backdrop-filter: blur(4px);
      z-index: 998;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .sidebar-backdrop.active {
      opacity: 1;
      visibility: visible;
    }

    @media (max-width: 767px) {
      .mobile-header {
        display: flex;
      }

      #sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 290px;
        height: 100vh;
        max-height: 100vh;
        z-index: 999;
        transform: translateX(-100%);
        border-right: 1px solid var(--border);
        border-bottom: none;
        box-shadow: 20px 0 40px rgba(0, 0, 0, 0.5);
        padding: 24px 0;
        overflow-y: auto;
      }

      #sidebar.open {
        transform: translateX(0);
      }
    }

    /* ---------- Responsive Desktop Layout ---------- */
    @media (min-width: 768px) {
      body {
        flex-direction: row;
      }

      #sidebar {
        width: 300px;
        min-width: 300px;
        max-height: 100vh;
        position: sticky;
        top: 0;
        overflow-y: auto;
        border-right: 1px solid var(--border);
        border-bottom: none;
        padding: 24px 0;
      }

      #main {
        padding: 40px 56px;
        max-width: 880px;
      }
    }

    .eyebrow {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ref);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    h2.title {
      font-size: 30px;
      margin: 0 0 6px 0;
      font-weight: 800;
    }

    .status-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 24px;
    }

    .status-badge.done {
      background: rgba(0, 216, 255, .12);
      color: var(--ref);
      border: 1px solid rgba(0, 216, 255, .35);
    }

    .status-badge.pending {
      background: rgba(124, 139, 161, .1);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .block {
      margin-bottom: 26px;
    }

    .block h3 {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--ref);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin: 0 0 10px 0;
    }

    .block p {
      line-height: 1.65;
      color: var(--text);
      font-size: 15px;
      margin: 0 0 10px 0;
    }

    .block p.muted {
      color: var(--muted);
    }

    pre {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 18px;
      overflow-x: auto;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.6;
      color: #cfe8e2;
    }

    .mistake {
      border-left: 3px solid var(--warn);
      background: rgba(255, 122, 122, .06);
      padding: 12px 16px;
      border-radius: 0 6px 6px 0;
      font-size: 14px;
      line-height: 1.6;
    }

    .mistake .label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--warn);
      letter-spacing: .5px;
      display: block;
      margin-bottom: 4px;
    }

    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
    }

    .empty-state .chain {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--border);
      margin-bottom: 18px;
    }

    .empty-state h3 {
      color: var(--text);
      font-size: 18px;
      margin-bottom: 8px;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
  </style>
  <script>window.TRACKER_DATA = [];</script>
  <script src="tracker-data/module-1.js"></script>
</head>

<body>

  <div id="sidebar">
    <div class="brand">
      <div class="tag">// react-mastery.chain</div>
      <h1>Study Chain</h1>
      <div class="sub">Marwa's React deep-dive tracker</div>
      <div style="margin-top: 14px;">
        <a href="handbook/index.html" style="color: var(--ref); text-decoration: none; font-size: 12px; font-family: var(--mono); display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid rgba(0, 216, 255, 0.2); border-radius: 6px; background: rgba(0, 216, 255, 0.05); transition: all 0.2s ease;" onmouseover="this.style.background='rgba(0, 216, 255, 0.15)'; this.style.borderColor='var(--ref)'" onmouseout="this.style.background='rgba(0, 216, 255, 0.05)'; this.style.borderColor='rgba(0, 216, 255, 0.2)'" id="handbook-link">
          📖 Open Handbook →
        </a>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-label" id="progressLabel">0 / 0 linked</div>
    </div>
    <div id="batchContainer"></div>
  </div>

  <div id="main">
    <div id="content">
      <div class="empty-state">
        <div class="chain">[ Component ] → [ Element ] → [ Fiber ]</div>
        <h3>Pick a topic from the chain</h3>
        <p>Click any item on the left to revise it.</p>
      </div>
    </div>
  </div>

  <script>
    const DATA = window.TRACKER_DATA || [];

    const batchContainer = document.getElementById('batchContainer');
    const content = document.getElementById('content');
    const sidebar = document.getElementById('sidebar');
    let allTopics = [];

    // 1. Dynamic creation of mobile header and backdrop
    document.addEventListener('DOMContentLoaded', () => {
      // Mobile header injection
      const mobileHeader = document.createElement('div');
      mobileHeader.className = 'mobile-header';
      mobileHeader.innerHTML = `
        <button class="menu-toggle" id="menuToggle" aria-label="Open Topics">☰ Topics</button>
        <div class="brand-title">Study Chain</div>
        <div style="width: 86px;"></div> <!-- Spacer to align center -->
      `;
      document.body.insertBefore(mobileHeader, document.body.firstChild);

      // Backdrop injection
      const backdrop = document.createElement('div');
      backdrop.className = 'sidebar-backdrop';
      document.body.appendChild(backdrop);

      // Drawer Open/Close Actions
      const openDrawer = () => {
        sidebar.classList.add('open');
        backdrop.classList.add('active');
        document.body.style.overflow = 'hidden';
      };
      
      const closeDrawer = () => {
        sidebar.classList.remove('open');
        backdrop.classList.remove('active');
        document.body.style.overflow = '';
      };

      document.getElementById('menuToggle').addEventListener('click', openDrawer);
      backdrop.addEventListener('click', closeDrawer);

      // Save closeDrawer reference globally so it can be called on item clicks
      window.closeSidebarDrawer = closeDrawer;
      window.openSidebarDrawer = openDrawer;

      // Escape key closes drawer
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeDrawer();
      });

      // Resize guard
      const mediaQuery = window.matchMedia('(min-width: 768px)');
      mediaQuery.addEventListener('change', (e) => {
        if (e.matches) closeDrawer();
      });

      // Native Touch Swipe Gestures
      let touchStartX = 0;
      let touchStartY = 0;
      const SWIPE_THRESHOLD = 60;
      const EDGE_THRESHOLD = 40;

      document.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].clientX;
        touchStartY = e.changedTouches[0].clientY;
      }, { passive: true });

      document.addEventListener('touchend', (e) => {
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const diffX = touchEndX - touchStartX;
        const diffY = touchEndY - touchStartY;

        if (Math.abs(diffX) > Math.abs(diffY)) {
          if (diffX > SWIPE_THRESHOLD && touchStartX < EDGE_THRESHOLD && !sidebar.classList.contains('open')) {
            openDrawer();
          } else if (diffX < -SWIPE_THRESHOLD && sidebar.classList.contains('open')) {
            closeDrawer();
          }
        }
      }, { passive: true });
    });

    DATA.forEach((batch, bIdx) => {
      const batchEl = document.createElement('div');
      batchEl.className = 'batch';
      const doneCount = batch.topics.filter(t => t.status === 'done').length;
      batchEl.innerHTML = `
        <div class="batch-head" data-idx="${bIdx}">
          <span>${batch.batch}</span>
          <span class="count">${doneCount}/${batch.topics.length}</span>
        </div>
        <div class="topic-list ${bIdx === 0 ? 'open' : ''}" id="list-${bIdx}"></div>
      `;
      batchContainer.appendChild(batchEl);

      const list = batchEl.querySelector(`#list-${bIdx}`);
      batch.topics.forEach(topic => {
        allTopics.push(topic);
        const item = document.createElement('div');
        item.className = 'topic-item';
        item.dataset.id = topic.id;
        item.innerHTML = `<span class="dot ${topic.status}"></span><span>${topic.title}</span>`;
        item.addEventListener('click', () => showTopic(topic, item));
        list.appendChild(item);
      });

      batchEl.querySelector('.batch-head').addEventListener('click', () => {
        list.classList.toggle('open');
      });
    });

    function updateProgress() {
      const done = allTopics.filter(t => t.status === 'done').length;
      const total = allTopics.length;
      document.getElementById('progressFill').style.width = `${(done / total * 100).toFixed(1)}%`;
      document.getElementById('progressLabel').textContent = `${done} / ${total} linked`;
    }
    updateProgress();

    function showTopic(topic, itemEl) {
      document.querySelectorAll('.topic-item').forEach(el => el.classList.remove('active'));
      itemEl.classList.add('active');

      // Close mobile drawer if open
      if (window.closeSidebarDrawer) {
        window.closeSidebarDrawer();
      }

      if (topic.status === 'pending') {
        content.innerHTML = `
          <div class="eyebrow">// not yet linked</div>
          <h2 class="title">${topic.title}</h2>
          <span class="status-badge pending">pending</span>
          <div class="empty-state" style="padding: 40px 0; text-align:left;">
            <p style="color: var(--muted); font-size:14px;">We haven't studied this one yet. It's queued in the chain — ask to jump here whenever you're ready.</p>
          </div>
        `;
      } else {
        const diagramHtml = topic.diagram ? `
          <div class="block">
            <h3>Under the Hood</h3>
            <pre>${topic.diagram}</pre>
          </div>
        ` : '';

        const trapsHtml = (topic.traps && topic.traps.length > 0) ? `
          <div class="block">
            <h3>Interview Traps</h3>
            ${topic.traps.map(trap => `
              <div class="mistake" style="margin-bottom: 12px;">
                <span class="label">trap</span>
                ${trap}
              </div>
            `).join('')}
          </div>
        ` : '';

        const interviewQHtml = topic.interviewQ ? `
          <div class="block" style="border-top: 1px dashed var(--border); padding-top: 20px; margin-top: 24px;">
            <h3 style="color: var(--ref);">Interview Question</h3>
            <p class="muted" style="font-style: italic; font-size: 14.5px;">${topic.interviewQ}</p>
          </div>
        ` : '';

        content.innerHTML = `
          <div class="eyebrow">// linked node</div>
          <h2 class="title">${topic.title}</h2>
          <span class="status-badge done">studied</span>

          <div class="block">
            <h3>Analogy</h3>
            <p>${topic.analogy}</p>
          </div>
          <div class="block">
            <h3>Core Idea</h3>
            <p>${topic.core}</p>
          </div>
          <div class="block">
            <h3>Code</h3>
            <pre>${topic.code}</pre>
          </div>
          ${diagramHtml}
          <div class="block">
            <h3>Gotcha</h3>
            <div class="mistake"><span class="label">common mistake</span>${topic.mistake}</div>
          </div>
          ${trapsHtml}
          <div class="block">
            <h3>Interview-Ready Answer</h3>
            <p class="muted">${topic.interview}</p>
          </div>
          ${interviewQHtml}
        `;
      }

      // Smooth scroll on mobile
      if (window.innerWidth < 768) {
        document.getElementById('main').scrollIntoView({ behavior: 'smooth' });
      }
    }
  </script>
</body>

</html>
